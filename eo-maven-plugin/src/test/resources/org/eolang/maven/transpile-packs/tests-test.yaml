---
# yamllint disable rule:line-length
sheets:
  - /org/eolang/parser/parse/set-locators.xsl
  - /org/eolang/maven/transpile/set-original-names.xsl
  - /org/eolang/maven/transpile/classes.xsl
  - /org/eolang/maven/transpile/tests.xsl
  - /org/eolang/maven/transpile/attrs.xsl
  - /org/eolang/maven/transpile/data.xsl
  - /org/eolang/maven/transpile/to-java.xsl
asserts:
  - /object[not(errors)]
  - //java[contains(text(), 'yes')]
  - //tests[contains(text(), '@Test')]
  - //tests[contains(text(), 'void works() throws java.lang.Exception')]
  - //tests[contains(text(), 'Assertions.assertTrue(')]
  - //tests[contains(text(), 'new Dataized(this.take("works")).asBool()')]
  - //tests[contains(text(), 'void _on_overflow() throws java.lang.Exception')]
  - //tests[contains(text(), 'Assertions.assertThrows(Exception.class, () -> {')]
  - //tests[contains(text(), 'new Dataized(this.take("-on-overflow")).asBool();')]
input: |
  [] > some
    7 > yes

    [] +> works
      1.eq 1 > @

    false > [] -> on-overflow
