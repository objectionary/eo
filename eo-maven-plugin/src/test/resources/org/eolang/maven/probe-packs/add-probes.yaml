---
# yamllint disable rule:line-length
probes:
  - 'tt'
  - 'tt.sprintf'
  - 'tt.text'
  - 'car'
  - 'car.engine'
  - 'car.engine.start'
  - 'stdout.and'
  - 'stdout.and.or'
  - 'string'
  - 'bytes'
  - 'stdout'
  - 'sprintf'
  - 'n'
  - 'true'
  - 'number'
  - 'memory'
  - 'fibonacci'
eo: |
  +home https://github.com/objectionary/eo
  +package org.eolang.custom
  +version 0.0.0

  # No comments.
  [] > app
    Q.tt.text.^.q > s
    Q.tt.sprintf > @
      "Hello, world!\n"
    start. > a
      engine.
        Q.car
    or. > fib
      and.
        stdout
          sprintf
            "%dth Fibonacci number is %d\n"
            n
            fibonacci n > f
        true

    # No comments.
    [i] > other
      stdout > @
        sprintf
          "%i"
    $.other 1 > one
    memory 0 > price

    # No comments.
    [p] > set-price
      ^.price.write p > @
