---
# yamllint disable rule:line-length
out:
  - ".*Hello, Jeff.*"
  - ".*eoc/classes.*"
  - ".*eoc/eo/4-resolve.*"
  - ".*eoc/eo-foreign.json.*"
file: simple.eo
args: ["simple", "Jeff"]
target: "eoc"
eo: |
  [args] > simple
    stdout > @
      "Hello, %s".printf
        * (args.at 0)
