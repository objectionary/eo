---
# yamllint disable rule:line-length
out:
  - ".*8 is the 6th number.*"
file: snippets/self-fibo.eo
args: ["snippets.self-fibo"]
eo: |
  +package snippets

  [] > self-fibo
    [n] >>
      if. > @
        n.lt 2
        n
        plus.
          % (n.minus 1)
          % (n.minus 2)
    | 6 > num
    stdout > @
      "%d is the %dth number\n".printf
        *
          num
          6
