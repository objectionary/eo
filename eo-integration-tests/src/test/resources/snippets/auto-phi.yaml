---
# yamllint disable rule:line-length
out:
  - ".*Jeff.*"
file: snippets/auto.eo
args: ["snippets.auto"]
eo: |
  +alias io.stdout
  +package snippets

  # No comments.
  [] > auto
    "Hi, Jeff" > str
    malloc.for > @
      str
      m.slice 4 4 > [m] >>
