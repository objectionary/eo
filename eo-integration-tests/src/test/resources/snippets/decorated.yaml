---
# yamllint disable rule:line-length
out:
  - ".*Sin of 1.234500 is 0.943983.*"
file: snippets/foo.eo
args: ["snippets.foo"]
eo: |
  +alias number.sine
  +package snippets

  [] > foo
    1.2345 > x
    stdout > @
      "Sin of %f is %f".printf
        *
          x
          sine x
