---
# yamllint disable rule:line-length
out:
  - ".*8 is the 6th number.*"
file: snippets/fibo.eo
args: ["snippets.fibo"]
eo: |
  +alias io.stdout
  +alias string.printf
  +package snippets

  [] > fibo
    [n] > f
      if. > @
        n.lt 2
        n
        plus.
          f (n.minus 1)
          f (n.minus 2)
    stdout > @
      printf
        "%d is the %dth number\n"
        *
          f 6
          6
