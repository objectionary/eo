---
# yamllint disable rule:line-length
name: qulice
'on':
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
jobs:
  qulice:
    timeout-minutes: 15
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: 26
      - uses: actions/cache@v6
        with:
          path: ~/.m2/repository
          key: ubuntu-qulice-jdk-26-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: ubuntu-qulice-jdk-26-maven-
      - run: mvn clean verify -PskipTests -Pqulice --errors --batch-mode
