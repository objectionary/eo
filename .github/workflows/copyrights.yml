---
# yamllint disable rule:line-length
name: copyrights
'on':
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
jobs:
  copyrights:
    timeout-minutes: 15
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Install copyrights checker
        run: npm install --no-save --omit=dev --loglevel=error copyrights-action@0.0.12
      - name: Check copyrights
        run: node node_modules/copyrights-action/src/copyrights.js
        env:
          INPUT_GLOBS: >-
            **/LICENSE.txt
            **/*.sh
            **/*.yml
            **/*.yaml
            **/*.eo
            **/*.xmir
            **/*.xml
            **/*.xsl
            **/*.xsd
            **/*.ini
            **/*.java
            **/*.g4
            **/*.properties
            **/*.toml
            **/*.groovy
