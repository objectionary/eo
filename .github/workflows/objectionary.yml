---
# yamllint disable rule:line-length
name: objectionary
'on':
  push:
    tags:
      - '*'
concurrency:
  group: objectionary-${{ github.ref }}
  cancel-in-progress: true
jobs:
  objectionary:
    timeout-minutes: 30
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: 26
      - uses: actions/cache@v6
        with:
          path: ~/.m2/repository
          key: ubuntu-qulice-jdk-26-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: ubuntu-qulice-jdk-26-maven-
      - run: mvn install -DskipTests -Dinvoker.skip --errors --batch-mode
      - run: .github/objectionary.sh ${{ github.ref_name }}
      - uses: JamesIves/github-pages-deploy-action@v4.8.0
        with:
          branch: gh-pages
          folder: gh-pages-objectionary
          target-folder: objectionary
          clean: true
      - uses: JamesIves/github-pages-deploy-action@v4.8.0
        with:
          branch: gh-pages
          folder: gh-pages
          clean: false
