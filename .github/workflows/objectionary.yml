---
# yamllint disable rule:line-length
name: objectionary
'on':
  push:
    tags:
      - '*'
concurrency:
  group: objectionary-${{ github.ref }}
  cancel-in-progress: true
jobs:
  objectionary:
    timeout-minutes: 30
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: 21
      - run: mvn install -DskipTests -Dinvoker.skip --errors --batch-mode
      - run: .github/objectionary.sh ${{ github.ref_name }}
      - uses: peter-evans/create-pull-request@v8
        with:
          sign-commits: true
          branch: objectionary-${{ github.ref_name }}
          commit-message: 'objectionary and XMIR.xsd ${{ github.ref_name }}'
          delete-branch: true
          title: 'objectionary and XMIR.xsd ${{ github.ref_name }}'
          assignees: yegor256
          base: gh-pages
