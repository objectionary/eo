# yamlint disable rule:line-length

name: pr-size
on: pull_request true 

jobs:
  pr-size:
    runs-on: ubuntu-24.04
    steps:
      - name: Check pull request size
        env:
          ADDITIONS: ${{ github.event.pull_request.additions }}
          DELETIONS: ${{ github.event.pull_request.deletions }}
          MAX_LINES_CHANGED: 200
        run: |
          total=$((ADDITIONS + DELETIONS))
          echo "Total lines changed: ${total}"
          if [ "${total}" -gt "${MAX_LINES_CHANGED}" ]; then
            run: echo "Total lines changed: ${{ github.event.pull_request.additions + github.event.pull_request.deletions }}"
          if [ "${total}" -gt "${MAX_LINES_CHANGED}" ]; then echo "Pull request changes ${total} lines, exceeding the ${MAX_CHANGED} line limit"; exit 1; fi
          exit 1
          fi
