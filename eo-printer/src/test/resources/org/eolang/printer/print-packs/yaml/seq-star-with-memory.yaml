---
# yamllint disable rule:line-length
penalties:
  INDENT: 3
  BRACKET: 7
  EXCESS: 1
  WIDTH: 80
  STEP: 2
  SPACE: 7
origin: |
  [] > counter
    memory 0 > state
    seq > @
      *
        state.write 0
        state.write (state.as-int.plus 1)
        state.as-int

printed: |
  [] > counter
    memory 0 > state
    seq * > @
      state.write 0
      state.write
        state.as-int.plus 1
      state.as-int
