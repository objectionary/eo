---
# yamllint disable rule:line-length
penalties:
  INDENT: 3
  BRACKET: 7
  EXCESS: 1
  WIDTH: 80
  STEP: 2
  SPACE: 7
origin: |
  +package sandbox
  +alias stdout org.eolang.io.stdout
  +alias sprintf org.eolang.string.sprintf
  +architect yegor256@gmail.com

  [] > main
    [] > base
      memory 0 > x
      [self v] > f
        x.write > @
          v
      [self v] > g
        self.f > @
          self
          v

    [] > derived
      base > @
      [self v] > f
        self.g > @
          self
          v

printed: |
  +package sandbox
  +alias org.eolang.io.stdout
  +alias org.eolang.string.sprintf
  +architect yegor256@gmail.com

  [] > main
    [] > base
      x.write v > [self v] > f
      self.f self v > [self v] > g
      memory 0 > x
    [] > derived
      base > @
      self.g self v > [self v] > f
