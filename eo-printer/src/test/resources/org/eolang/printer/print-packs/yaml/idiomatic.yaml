---
# yamllint disable rule:line-length
penalties:
  INDENT: 3
  BRACKET: 7
  EXCESS: 1
  WIDTH: 80
  STEP: 2
origin: |
  +meta1
  +meta2 short
  +meta2 long tail

  [x x2 x3] > idiomatic
    5 > iTest_me
    [] > rr /number
    if. > @
      plus.
        this
          minus.
            n
            "家"
            4.55 > x!
            *
              "Hello, друг"
              2.18
              true
        bar
          plus.
            n
            "hello, 大家!"

printed: |
  +meta1
  +meta2 short
  +meta2 long tail

  [x x2 x3] > idiomatic
    5 > iTest_me
    [] > rr /number
    if. > @
      plus.
        this
          n.minus *2
            "家"
            x
            "Hello, друг"
            2.18
            true
        bar (n.plus "hello, 大家!")
    4.55 > x!
