---
# yamllint disable rule:line-length
origin: |
  +meta1
  +meta2 short
  +meta2 long tail

  [x x2 x3] > idiomatic
    5 > iTest_me
    [] > rr /number
    if. > @
      plus.
        this
          minus.
            n
            "家"
            4.55 > x!
            *
              "Hello, друг"
              2.18
              true
        bar
          plus.
            n
            "hello, 大家!"

printed: |
  +meta1
  +meta2 short
  +meta2 long tail

  [x x2 x3] > idiomatic
    5 > iTest_me
    [] > rr /number
    if. > @
      plus.
        this
          n.minus
            "家"
            x
            * "Hello, друг" 2.18 true
        bar (n.plus "hello, 大家!")
    4.55 > x!
