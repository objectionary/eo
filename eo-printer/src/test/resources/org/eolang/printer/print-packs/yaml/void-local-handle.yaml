---
# yamllint disable rule:line-length
penalties:
  INDENT: 3
  BRACKET: 7
  EXCESS: 1
  WIDTH: 80
  STEP: 2
  SPACE: 7
origin: |
  +package tuple

  [] > last-index-of
    ? >> list
    ? >> wanted
    reclast list > @
    [tup] > reclast
      if. > @
        tup.length.eq 0
        -1
        if.
          tup.head.eq wanted
          tup.tail.length
          reclast tup.tail

printed: |
  +package tuple

  [] > last-index-of
    ? >> list
    ? >> wanted
    reclast list > @
    if. > [tup] > reclast
      tup.length.eq 0
      -1
      (tup.head.eq wanted).if
        tup.tail.length
        reclast tup.tail
