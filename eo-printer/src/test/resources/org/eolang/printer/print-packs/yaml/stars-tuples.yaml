# yamllint disable rule:line-length
penalties:
  INDENT: 3
  BRACKET: 7
  EXCESS: 1
  WIDTH: 80
  STEP: 2
  SPACE: 7
origin: |
  [] > main
    * 1 "Hello" x > array
    * > xs
      *:0
        1:0
        2:1
      *:1
        3:0
        4:1
      *:2
        5:0
        6:1

printed: |
  [] > main
    * > array
      1
      "Hello"
      x
    * > xs
      * 1 2
      * 3 4
      * 5 6
