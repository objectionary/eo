---
# yamllint disable rule:line-length
# The applied recursive-handle fold (#5848) also applies when the applied
# reference is NOT a method-dispatch receiver but a plain "handle args" used as
# a list element — here "r walked" as the first element of "seq *". It folds
# just like the dispatch-receiver case: the recursive "[tup] >> r" handle is
# hosted as a moniker in place of the reference and its argument becomes a
# "| walked" pipe continuation binding it. Mirrors the "deleted" helper in
# "directory.eo", whose "r (walk ...)" inside "seq *" folds the same way. The
# folded form round-trips (a "*" star tuple faithfully carries the moniker plus
# pipe since #5858).
penalties:
  INDENT: 3
  BRACKET: 7
  EXCESS: 1
  WIDTH: 80
  STEP: 2
  SPACE: 7
origin: |
  [] > foo
    seq * > @
      r walked
      ^
    [tup] >> r
      seq * > @
        tup.head
        r tup.tail
printed: |
  [] > foo
    seq * > @
      seq * > [tup] >> r
        tup.head
        r tup.tail
      | walked
      ^
