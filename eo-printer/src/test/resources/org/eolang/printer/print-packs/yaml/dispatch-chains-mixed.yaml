# yamllint disable rule:line-length
penalties:
  INDENT: 3
  BRACKET: 7
  EXCESS: 1
  WIDTH: 80
  STEP: 2
  APPLICATION: 7
origin: |
  [a b c] > math
    a.plus (b.times c) > weighted
    a.plus b > sum
    (a.plus b).div c > mean
    (a.gt b).and (b.gt c) > sorted

printed: |
  [a b c] > math
    a.plus > weighted
      b.times c
    a.plus b > sum
    (a.plus b).div c > mean
    (a.gt b).and > sorted
      b.gt c
