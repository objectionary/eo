---
# yamllint disable rule:line-length
# A recursive ">>"-named formation referenced with arguments still becomes a
# moniker: the compiler-obfuscated binding is inlined at the reference site
# and its arguments float onto it as a "| args" pipe continuation (§3.14),
# instead of staying a standalone binding plus a separate "r list" reference.
# The self-reference inside the inlined body ("r t.tail") prints as the bare
# handle, since that handle is in scope from within its own formation.
penalties:
  INDENT: 3
  BRACKET: 7
  EXCESS: 1
  WIDTH: 80
  STEP: 2
  SPACE: 7
origin: |
  +package tuple

  [list index] > front
    if. > @
      index.eq 0
      list
      r list
    if. > [t] >> r
      t.length.eq index
      t
      r t.tail
printed: |
  +package tuple

  [list index] > front
    if. > @
      index.eq 0
      list
      if. > [t] >> r
        t.length.eq index
        t
        r t.tail
      | list
