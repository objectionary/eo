---
# yamllint disable rule:line-length
# A tuple applied to a lone "seq > @" decoratee whose formation has no other
# binding: the formation collapses through the inline-phi form into
# "seq > [] > foo" with the star laid out beneath, which beats the "seq *" glue
# here. The glue itself is shown by seq-star-with-memory, whose formation
# carries a second binding and so cannot collapse.
penalties:
  INDENT: 3
  BRACKET: 7
  EXCESS: 1
  WIDTH: 80
  STEP: 2
  APPLICATION: 7
origin: |
  [] > foo
    seq > @
      *
        bar.deleted
        if.
          outcome.eq 0
          ^
          T
            "Cant delete '%s': %s".printf
              * path created.output

printed: |
  seq > [] > foo
    *
      bar.deleted
      if.
        outcome.eq 0
        ^
        T
          "Cant delete '%s': %s".printf
            * path created.output
