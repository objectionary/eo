# yamllint disable rule:line-length
origin: |
  [] > foo
    seq > @
      *
        bar.deleted
        if.
          outcome.eq 0
          ^
          T
            "Cant delete '%s': %s".printf
              * path created.output

printed: |
  [] > foo
    seq * > @
      bar.deleted
      if.
        outcome.eq 0
        ^
        T
          "Cant delete '%s': %s".printf
            * path created.output
