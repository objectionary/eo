# yamllint disable rule:line-length
penalties:
  INDENT: 3
  BRACKET: 7
  EXCESS: 1
  WIDTH: 80
  STEP: 2
  SPACE: 7
origin: |
  +package sandbox
  +alias sm.os
  +alias org.eolang.io.stdout
  +alias custom org.eolang.string.regex

  [] > app
    os > x

printed: |
  +package sandbox
  +alias sm.os
  +alias org.eolang.io.stdout
  +alias custom Q.org.eolang.string.regex

  [] > app
    sm.os > x
