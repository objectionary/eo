# yamllint disable rule:line-length
penalties:
  INDENT: 3
  BRACKET: 7
  EXCESS: 1
  WIDTH: 80
  STEP: 2
  SPACE: 7
origin: |
  [x] > classify
    if. > @
      x.lt 0
      "negative"
      if.
        x.eq 0
        "zero"
        "positive"

printed: |
  [x] > classify
    (x.lt 0).if > @
      "negative"
      (x.eq 0).if
        "zero"
        "positive"
