---
# yamllint disable rule:line-length
# A chain of nested "if." dispatches. The inner if. inlines in parentheses as
# an argument of the outer one, but the outer if. stays vertical: at these
# weights the fully-collapsed single line (two brackets, many application
# spaces) costs more than the inline-phi form would save.
penalties:
  INDENT: 3
  BRACKET: 7
  EXCESS: 1
  WIDTH: 80
  STEP: 2
  APPLICATION: 7
origin: |
  [x] > classify
    if. > @
      x.lt 0
      "negative"
      if.
        x.eq 0
        "zero"
        "positive"

printed: |
  [x] > classify
    if. > @
      x.lt 0
      "negative"
      if. (x.eq 0) "zero" "positive"
