---
# yamllint disable rule:line-length
penalties:
  INDENT: 3
  BRACKET: 7
  EXCESS: 1
  WIDTH: 80
  STEP: 2
  SPACE: 7
origin: |
  [] > shapes
    [width height] > rectangle
      width.times height > @
    rectangle 3 4 > area
    (rectangle 3 4).plus (rectangle 1 2) > total

printed: |
  [] > shapes
    width.times height > [width height] > rectangle
    rectangle > area
      3
      4
    (rectangle 3 4).plus > total
      rectangle
        1
        2
