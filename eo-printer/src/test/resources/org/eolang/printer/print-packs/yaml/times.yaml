# yamllint disable rule:line-length
penalties:
  INDENT: 3
  BRACKET: 7
  EXCESS: 1
  WIDTH: 80
  STEP: 2
  SPACE: 7
origin: |
  [] > app
    Q.io.stdout > @
      Q.string.sprintf
        "result is %d\n"
        -1.times 228

printed: |
  [] > app
    io.stdout > @
      string.sprintf
        "result is %d\n"
        -1.times 228
