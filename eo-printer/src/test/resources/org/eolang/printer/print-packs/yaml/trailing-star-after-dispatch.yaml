---
# yamllint disable rule:line-length
penalties:
  INDENT: 3
  BRACKET: 7
  EXCESS: 1
  WIDTH: 80
  STEP: 2
  APPLICATION: 7
origin: |
  [nstart nlen code] > main
    "Start index + length to slice (%d) is out of string bounds".printf > long
      * (nstart.plus nlen)
    "Start index (%d) is out of string bounds".printf > short
      * nstart
    "WSA error code %d".printf > wsa
      * code.as-int

printed: |
  [nstart nlen code] > main
    "Start index + length to slice (%d) is out of string bounds".printf > long
      *
        nstart.plus nlen
    "Start index (%d) is out of string bounds".printf > short
      * nstart
    "WSA error code %d".printf > wsa
      * code.as-int
