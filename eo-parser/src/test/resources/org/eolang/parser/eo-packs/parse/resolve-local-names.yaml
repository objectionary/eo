---
# yamllint disable rule:line-length
sheets:
  - /org/eolang/parser/parse/resolve-local-names.xsl
asserts:
  - /object[not(errors)]
  - /object[count(//o[@base='a🌵2-2'])=2]
  - //o[@name='a🌵2-2' and @local='fibo']
input: |
  [] > app
    [n] >> fibo
      plus. > @
        fibo (n.minus 1)
        fibo (n.minus 2)
