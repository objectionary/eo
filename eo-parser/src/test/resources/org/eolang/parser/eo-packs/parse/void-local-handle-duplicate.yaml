# yamllint disable rule:line-length
sheets:
  - /org/eolang/parser/parse/resolve-local-names.xsl
asserts:
  - /object/errors[count(error)=1]
  - /object/errors/error[@check='resolve-local-names' and @severity='error' and @line='3']
