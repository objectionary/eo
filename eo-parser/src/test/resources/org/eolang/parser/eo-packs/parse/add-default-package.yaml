---
# yamllint disable rule:line-length
sheets:
  - /org/eolang/parser/parse/wrap-method-calls.xsl
  - /org/eolang/parser/parse/vars-float-up.xsl
  - /org/eolang/parser/parse/expand-aliases.xsl
  - /org/eolang/parser/parse/resolve-aliases.xsl
  - /org/eolang/parser/parse/add-default-package.xsl
asserts:
  - /object[not(errors)]
  - /object[count(o)=1]
  - //o[@base='Φ.and']
  - //o[@base='Φ.foo']
  - //o[@base='ξ']
  - //o[@base='ρ']
  - //o[@base='Φ']
  - /object/metas/meta[head='also' and tail='Φ.x.number' and part='Φ.x.number']
  - /object/metas/meta[head='also' and tail='Φ.string' and part='Φ.string']
input: |
  +alias foo
  +alias scanner org.eolang.string.scanner
  +alias stdin org.eolang.io.stdin
  +alias stdout org.eolang.io.stdout
  +foo Some other meta
  +also Q.x.number
  +also string

  [args] > main
    stdin.x > w
    and > @
      (scanner stdin).next-line > line!
      (stdout "You entered" line).print
      $
      ^.i
      foo
      Q.random
