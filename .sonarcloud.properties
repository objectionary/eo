# The EOsm layer is thin, repetitive syscall glue (JNA bindings, per-OS
# dispatchers, near-identical stat structs); exclude it from duplication
# detection so it does not trip the new-code duplication quality gate.
sonar.cpd.exclusions=**/EOsm/**
